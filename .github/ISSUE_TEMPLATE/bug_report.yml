name: Bug Report / Feedback
description: Report a bug or suggest an improvement for the browser extension
title: "[Bug] "
labels: ["needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this report! Please provide as much detail as possible.

  - type: dropdown
    id: type
    attributes:
      label: Issue Type
      description: What kind of issue is this?
      options:
        - Bug (something is broken)
        - Feature request
        - Question / Support
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & Version
      description: e.g., Chrome 120, Firefox 115, Edge 121
      placeholder: "Chrome 120"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Extension Version
      description: You can find this in your browser's extension manager
      placeholder: "v1.2.3"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: e.g., Windows 11, macOS Sonoma, Ubuntu 22.04
      placeholder: "Windows 11"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise summary of the issue.
      placeholder: "What happened? What did you expect?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected the extension to do.
      placeholder: "The extension should ..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Add screenshots or error messages if possible.
      placeholder: "Instead, it ..."
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Before Submitting
      description: Please confirm the following
      options:
        - label: I have searched existing issues and found no duplicates.
          required: true
        - label: I am using the latest version of the extension.
          required: true
        - label: I have tested this in an incognito window with all other extensions disabled.
          required: false